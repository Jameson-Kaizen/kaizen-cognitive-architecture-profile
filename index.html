ing": "R", "text": "My work suffers when I have to improvise."}, {"id": "q282", "kind": "likert", "domain": "Mind", "trait": "Open-Mindedness", "facet": "Perspective-Taking", "keying": "R", "text": "I assume my read on a situation is the right one."}, {"id": "q283", "kind": "likert", "domain": "People", "trait": "Compassion", "facet": "Helpfulness", "keying": "R", "text": "I leave people to sort out their own issues."}, {"id": "q284", "kind": "likert", "domain": "Drive", "trait": "Even-Temperedness", "facet": "Slow to Anger", "keying": "R", "text": "I stay irritated long after the moment has passed."}, {"id": "q285", "kind": "fc", "text": "A gift of free time would go to", "opts": [{"trait": "Curiosity", "text": "Learning something"}, {"trait": "Warmth", "text": "People I love"}, {"trait": "Adaptability", "text": "Something spontaneous"}, {"trait": "Composure", "text": "Rest"}]}, {"id": "q286", "kind": "likert", "domain": "Mind", "trait": "Reflectiveness", "facet": "Introspection", "keying": "R", "text": "Why I do things is not something I dwell on."}, {"id": "q287", "kind": "likert", "domain": "People", "trait": "Diplomacy", "facet": "Cooperation", "keying": "R", "text": "I would rather win than keep the peace."}, {"id": "q288", "kind": "likert", "domain": "Drive", "trait": "Industriousness", "facet": "Achievement Striving", "keying": "P", "text": "I aim for more than what is expected."}, {"id": "q289", "kind": "likert", "domain": "Mind", "trait": "Focus", "facet": "Task Persistence", "keying": "R", "text": "I give up when a task drags on."}, {"id": "q290", "kind": "likert", "domain": "People", "trait": "Trust", "facet": "Openness to Others", "keying": "R", "text": "I assume anything I share could be used against me."}, {"id": "q291", "kind": "likert", "domain": "Drive", "trait": "Order", "facet": "Tidiness", "keying": "P", "text": "I like my surroundings orderly."}, {"id": "q292", "kind": "likert", "domain": "Drive", "trait": "Self-Discipline", "facet": "Follow-Through", "keying": "P", "text": "I finish what I commit to."}, {"id": "q293", "kind": "likert", "domain": "Drive", "trait": "Composure", "facet": "Recovery", "keying": "P", "text": "A rough moment rarely turns into a rough week."}, {"id": "q294", "kind": "likert", "domain": "Drive", "trait": "Optimism", "facet": "Hopefulness", "keying": "P", "text": "I trust that better days are ahead."}, {"id": "q295", "kind": "likert", "domain": "Drive", "trait": "Adaptability", "facet": "Improvisation", "keying": "P", "text": "When the plan falls apart, I find another way on the spot."}, {"id": "q296", "kind": "likert", "domain": "Drive", "trait": "Even-Temperedness", "facet": "Slow to Anger", "keying": "P", "text": "Small annoyances roll off me."}, {"id": "q297", "kind": "likert", "domain": "Drive", "trait": "Industriousness", "facet": "Achievement Striving", "keying": "R", "text": "I do not set ambitious goals for myself."}, {"id": "q298", "kind": "likert", "domain": "Drive", "trait": "Order", "facet": "Tidiness", "keying": "R", "text": "Keeping things tidy is not a priority for me."}, {"id": "q299", "kind": "likert", "domain": "Drive", "trait": "Self-Discipline", "facet": "Follow-Through", "keying": "R", "text": "People cannot always rely on me to deliver."}, {"id": "q300", "kind": "likert", "domain": "Drive", "trait": "Composure", "facet": "Recovery", "keying": "R", "text": "One bad thing can throw off my whole week."}, {"id": "q301", "kind": "likert", "domain": "Drive", "trait": "Optimism", "facet": "Hopefulness", "keying": "R", "text": "I doubt that effort changes much."}, {"id": "q302", "kind": "likert", "domain": "Drive", "trait": "Adaptability", "facet": "Improvisation", "keying": "R", "text": "I get lost without clear instructions."}, {"id": "q303", "kind": "likert", "domain": "Drive", "trait": "Even-Temperedness", "facet": "Slow to Anger", "keying": "R", "text": "Little things can set me off."}], "model": {"Mind": {"Curiosity": ["Inquisitiveness", "Love of Learning"], "  "Focus"}, "Gregariousness": {"domain": "People", "trait": "Sociability"}, "Social Energy": {"domain": "People", "trait": "Sociability"}, "Taking Charge": {"domain": "People", "trait": "Assertiveness"}, "Speaking Up": {"domain": "People", "trait": "Assertiveness"}, "Approachability": {"domain": "People", "trait": "Warmth"}, "Expressiveness": {"domain": "People", "trait": "Warmth"}, "Empathy": {"domain": "People", "trait": "Compassion"}, "Helpfulness": {"domain": "People", "trait": "Compassion"}, "Politeness": {"domain": "People", "trait": "Diplomacy"}, "Cooperation": {"domain": "People", "trait": "Diplomacy"}, "Good Faith": {"domain": "People", "trait": "Trust"}, "Openness to Others": {"domain": "People", "trait": "Trust"}, "Work Ethic": {"domain": "Drive", "trait": "Industriousness"}, "Achievement Striving": {"domain": "Drive", "trait": "Industriousness"}, "Structure": {"domain": "Drive", "trait": "Order"}, "Tidiness": {"domain": "Drive", "trait": "Order"}, "Self-Control": {"domain": "Drive", "trait": "Self-Discipline"}, "Follow-Through": {"domain": "Drive", "trait": "Self-Discipline"}, "Calm Under Pressure": {"domain": "Drive", "trait": "Composure"}, "Recovery": {"domain": "Drive", "trait": "Composure"}, "Positive Outlook": {"domain": "Drive", "trait": "Optimism"}, "Hopefulness": {"domain": "Drive", "trait": "Optimism"}, "Comfort with Change": {"domain": "Drive", "trait": "Adaptability"}, "Improvisation": {"domain": "Drive", "trait": "Adaptability"}, "Patience": {"domain": "Drive", "trait": "Even-Temperedness"}, "Slow to Anger": {"domain": "Drive", "trait": "Even-Temperedness"}, "Honesty": {"domain": "Character", "trait": "Integrity"}, "Authenticity": {"domain": "Character", "trait": "Integrity"}, "Modesty": {"domain": "Character", "trait": "Humility"}, "Unpretentiousness": {"domain": "Character", "trait": "Humility"}, "Thankfulness": {"domain": "Character", "trait": "Gratitude"}, "Appreciation of Others": {"domain": "Character", "trait": "Gratitude"}, "Moral Courage": {"domain": "Character", "trait": "Courage"}, "Facing Fear": {"domain": "Character", "trait": "Courage"}, "Meaning": {"domain": "Character", "trait": "Purpose"}, "Direction": {"domain": "Character", "trait": "Purpose"}}, "traitDomain": {"Curiosity": "Mind", "Originality": "Mind", "Aesthetic Sensitivity": "Mind", "Open-Mindedness": "Mind", "Reflectiveness": "Mind", "Focus": "Mind", "Sociability": "People", "Assertiveness": "People", "Warmth": "People", "Compassion": "People", "Diplomacy": "People", "Trust": "People", "Industriousness": "Drive", "Order": "Drive", "Self-Discipline": "Drive", "Composure": "Drive", "Optimism": "Drive", "Adaptability": "Drive", "Even-Temperedness": "Drive", "Integrity": "Character", "Humility": "Character", "Gratitude": "Character", "Courage": "Character", "Purpose": "Character"}, "traits": ["Curiosity", "Originality", "Aesthetic Sensitivity", "Open-Mindedness", "Reflectiveness", "Focus", "Sociability", "Assertiveness", "Warmth", "Compassion", "Diplomacy", "Trust", "Industriousness", "Order", "Self-Discipline", "Composure", "Optimism", "Adaptability", "Even-Temperedness", "Integrity", "Humility", "Gratitude", "Courage", "Purpose"], "archetypes": [{"name": "The Curious", "slug": "curious", "family": "Mind", "tagline": "A mind that reaches for what is new.", "prototype": {"Curiosity": 2, "Originality": 0, "Aesthetic Sensitivity": 0, "Open-Mindedness": 2, "Reflectiveness": 0, "Focus": 0, "Sociability": 0, "Assertiveness": 0, "Warmth": 0, "Compassion": 0, "Diplomacy": 0, "Trust": 0, "Industriousness": 0, "Order": 0, "Self-Discipline": 0, "Composure": 0, "Optimism": 0, "Adaptability": 0, "Even-Temperedness": 0, "Integrity": 0, "Humility": 0, "Gratitude": 0, "Courage": 0, "Purpose": 0}, "portrait": "The Curious is driven by a restless appetite to understand. You are pulled toward questions more than answers, and toward the unfamiliar more than the settled. Where others accept how things are, you want to know why, and you follow that thread wherever it leads. People experience you as someone who keeps a conversation, and a mind, wide open.", "talents": "You learn fast, ask the questions others skip, and see angles no one else noticed. Ideas and possibilities pull at you more than certainty does.", "growth": "Your growth edge is depth and follow-through. The pull of the next new thing can leave a trail of half-explored ones, so the practice is finishing what you start before you move on.", "strengths": ["Asking the question everyone else skipped", "Learning new things fast and connecting them across fields", "Staying open to being wrong and updating quickly", "Spotting angles and possibilities others miss"], "watchouts": ["Chasing the next new thing before finishing the last", "Mistaking a fascinating question for a useful one"], "essence": "a restless appetite to understand"}, {"name": "The Originator", "slug": "originator", "family": "Mind", "tagline": "A source of new ideas.", "prototype": {"Curiosity": 0, "Originality": 2, "Aesthetic Sensitivity": 0, "Open-Mindedness": 0, "Reflectiveness": 0, "Focus": 0, "Sociability": 0, "Assertiveness": 0, "Warmth": 0, "Compassion": 0, "Diplomacy": 0, "Trust": 0, "Industriousness": 0, "Order": 0, "Self-Discipline": 0, "Composure": 0, "Optimism": 0, "Adaptability": 0, "Even-Temperedness": 0, "Integrity": 0, "Humility": 0, "Gratitude": 0, "Courage": 1, "Purpose": 0}, "portrait": "The Originator is a natural source of new ideas. Your mind runs ahead of the obvious, offering angles and solutions others do not see, and you are comfortable breaking from how things are usually done. You would rather invent a path than walk a well-worn one. At your best, you are exactly the person a stuck problem needs.", "talents": "You generate fresh, unexpected ideas and are comfortable doing things your own way. People come to you when the obvious answer is not good enough.", "growth": "Your edge is turning ideas into finished things. Light structure and a habit of shipping one idea before starting the next keep your originality from staying theoretical.", "strengths": ["Generating fresh ideas when the obvious answer falls short", "Doing things your own way without needing permission", "Reframing a stuck problem so a new path appears", "Bringing an angle no one else in the room had"], "watchouts": ["Leaving ideas at the concept stage without building them", "Reinventing what already works well enough"], "essence": "a knack for fresh, unexpected ideas"}, {"name": "The Aesthete", "slug": "aesthete", "family": "Mind", "tagline": "Tuned to beauty and craft.", "prototype": {"Curiosity": 0, "Originality": 1, "Aesthetic Sensitivity": 2, "Open-Mindedness": 0, "Reflectiveness": 1, "Focus": 0, "Sociability": 0, "Assertiveness": 0, "Warmth": 0, "Compassion": 0, "Diplomacy": 0, "Trust": 0, "Industriousness": 0, "Order": 0, "Self-Discipline": 0, "Composure": 0, "Optimism": 0, "Adaptability": 0, "Even-Temperedness": 0, "Integrity": 0, "Humility": 0, "Gratitude": 0, "Courage": 0, "Purpose": 0}, "portrait": "The Aesthete moves through the world attuned to beauty, form, and feeling. You notice the texture of things, the design behind them, and the emotion they carry, and it matters to you that things are done with care and taste. You bring a sensibility to your work and surroundings that others feel even when they cannot name it.", "talents": "You are moved by beauty and attuned to how things look and feel. You bring taste, care, and a sense of craft to whatever you touch.", "growth": "Your edge is pragmatism. The practice is letting good enough ship, so your standards elevate the work rather than stall it.", "strengths": ["Noticing form, texture, and detail others walk past", "Holding a high bar for craft and taste", "Making work and spaces feel considered and cared for", "Sensing the emotional tone a design carries"], "watchouts": ["Letting the pursuit of beautiful stall the good-enough", "Taking rough feedback on your work personally"], "essence": "an eye for beauty and craft"}, {"name": "The Analyst", "slug": "analyst", "family": "Mind", "tagline": "Deep, focused thinking.", "prototype": {"Curiosity": 0, "Originality": 0, "Aesthetic Sensitivity": 0, "Open-Mindedness": 0, "Reflectiveness": 2, "Focus": 2, "Sociability": 0, "Assertiveness": 0, "Warmth": 0, "Compassion": 0, "Diplomacy": 0, "Trust": 0, "Industriousness": 0, "Order": 0, "Self-Discipline": 0, "Composure": 0, "Optimism": 0, "Adaptability": 0, "Even-Temperedness": 0, "Integrity": 0, "Humility": 0, "Gratitude": 0, "Courage": 0, "Purpose": 0}, "portrait": "The Analyst is a deep, careful thinker. You concentrate where others skim, weigh the downsides before you move, and hold your judgment until you have thought it through. You are the steady mind in a fast room, the one who catches what a quick take would miss. People trust your read because it is earned.", "talents": "You think things through, concentrate deeply, and weigh the downsides before you act. Your judgment is careful and hard to rattle.", "growth": "Your edge is decisiveness. When analysis becomes delay, the practice is setting a decision deadline and acting on good-enough certainty.", "strengths": ["Concentrating deeply where others skim", "Weighing the downside before committing", "Catching the flaw a quick take would miss", "Holding judgment until the thinking is done"], "watchouts": ["Letting analysis slide into delay", "Waiting for a certainty that will not arrive"], "essence": "deep, careful thinking"}, {"name": "The Sage", "slug": "sage", "family": "Mind", "tagline": "Sees many sides, stays grounded.", "prototype": {"Curiosity": 0, "Originality": 0, "Aesthetic Sensitivity": 0, "Open-Mindedness": 2, "Reflectiveness": 2, "Focus": 0, "Sociability": 0, "Assertiveness": 0, "Warmth": 0, "Compassion": 0, "Diplomacy": 0, "Trust": 0, "Industriousness": 0, "Order": 0, "Self-Discipline": 0, "Composure": 1, "Optimism": 0, "Adaptability": 0, "Even-Temperedness": 0, "Integrity": 0, "Humility": 0, "Gratitude": 0, "Courage": 0, "Purpose": 0}, "portrait": "The Sage sees many sides and stays grounded in the middle of them. You hold competing views without collapsing them too quickly, you understand your own reactions well, and you offer people a balanced, trustworthy perspective on hard questions. Others come to you not for the fastest answer but for the wisest one.", "talents": "You hold opposing views before deciding, understand yourself well, and give people a balanced, trustworthy read on hard questions.", "growth": "Your edge is commitment. Seeing every side can delay a stand, so the practice is choosing a position and moving, even without perfect clarity.", "strengths": ["Holding competing views without collapsing them early", "Reading yourself and your reactions accurately", "Giving people a balanced take on hard questions", "Staying grounded when a topic gets heated"], "watchouts": ["Seeing every side and never taking a stand", "Delaying a decision in the name of more perspective"], "essence": "a balanced, grounded read on hard questions"}, {"name": "The Catalyst", "slug": "catalyst", "family": "People", "tagline": "Energy that gets people moving.", "prototype": {"Curiosity": 0, "Originality": 0, "Aesthetic Sensitivity": 0, "Open-Mindedness": 0, "Reflectiveness": 0, "Focus": 0, "Sociability": 2, "Assertiveness": 2, "Warmth": 0, "Compassion": 0, "Diplomacy": 0, "Trust": 0, "Industriousness": 0, "Order": 0, "Self-Discipline": 0, "Composure": 0, "Optimism": 1, "Adaptability": 0, "Even-Temperedness": 0, "Integrity": 0, "Humility": 0, "Gratitude": 0, "Courage": 0, "Purpose": 0}, "portrait": "The Catalyst brings energy that moves people. You think out loud, act quickly, and lift the charge in any room you enter. Where there is hesitation, you create momentum, and where there is a plan, you get it going. People feel more capable and more motivated in your presence.", "talents": "You bring energy into a room, think out loud, and get people and momentum going. Others feel more motivated when you are around.", "growth": "Your edge is protected focus. Momentum can crowd out deep work, so the practice is guarding a daily heads-down block before you go out loud.", "strengths": ["Bringing energy and momentum into a flat room", "Getting people moving when they are stuck", "Thinking out loud in a way that pulls others in", "Turning a plan into action quickly"], "watchouts": ["Letting momentum crowd out deep, quiet work", "Moving so fast that others cannot keep up"], "essence": "energy that gets people moving"}, {"name": "The Connector", "slug": "connector", "family": "People", "tagline": "Builds relationships and belonging.", "prototype": {"Curiosity": 0, "Originality": 0, "Aesthetic Sensitivity": 0, "Open-Mindedness": 0, "Reflectiveness": 0, "Focus": 0, "Sociability": 2, "Assertiveness": 0, "Warmth": 2, "Compassion": 0, "Diplomacy": 0, "Trust": 1, "Industriousness": 0, "Order": 0, "Self-Discipline": 0, "Composure": 0, "Optimism": 0, "Adaptability": 0, "Even-Temperedness": 0, "Integrity": 0, "Humility": 0, "Gratitude": 0, "Courage": 0, "Purpose": 0}, "portrait": "The Connector builds warmth and belonging wherever they go. You reach out easily, make people feel at home, and turn a set of individuals into something that feels like a group. Relationships are not a task for you, they are how you operate, and people are naturally drawn into your orbit.", "talents": "You build relationships easily and make people feel at home. Groups tend to form around you, and you keep them warm.", "growth": "Your edge is boundaries. Pouring out warmth can run you empty, so the practice is protecting your own time and energy on purpose.", "strengths": ["Making people feel at home right away", "Turning individuals into a group that coheres", "Reaching out and keeping relationships warm", "Remembering what matters to the people around you"], "watchouts": ["Pouring out warmth until you run empty", "Avoiding the hard conversation to keep the peace"], "essence": "a gift for warmth and belonging"}, {"name": "The Diplomat", "slug": "diplomat", "family": "People", "tagline": "Finds common ground.", "prototype": {"Curiosity": 0, "Originality": 0, "Aesthetic Sensitivity": 0, "Open-Mindedness": 2, "Reflectiveness": 0, "Focus": 0, "Sociability": 0, "Assertiveness": 0, "Warmth": 0, "Compassion": 1, "Diplomacy": 2, "Trust": 0, "Industriousness": 0, "Order": 0, "Self-Discipline": 0, "Composure": 0, "Optimism": 0, "Adaptability": 0, "Even-Temperedness": 1, "Integrity": 0, "Humility": 0, "Gratitude": 0, "Courage": 0, "Purpose": 0}, "portrait": "The Diplomat is the one who keeps people working together. You understand every side of a disagreement, you find the ground everyone can stand on, and you lower the temperature when things heat up. Where others see a conflict, you see a solution waiting to be brokered.", "talents": "You smooth tension, understand every side, and find the solution people can actually agree on. You keep groups working together.", "growth": "Your edge is taking a firm stand. Keeping the peace can mean going unheard, so the practice is voicing your own position clearly, even when it creates friction.", "strengths": ["Understanding every side of a disagreement", "Finding the ground everyone can actually stand on", "Lowering the temperature when things heat up", "Keeping a group working together under strain"], "watchouts": ["Smoothing over conflict that needs to surface", "Going unheard by protecting everyone else first"], "essence": "a talent for finding common ground"}, {"name": "The Champion", "slug": "champion", "family": "People", "tagline": "Leads and advocates.", "prototype": {"Curiosity": 0, "Originality": 0, "Aesthetic Sensitivity": 0, "Open-Mindedness": 0, "Reflectiveness": 0, "Focus": 0, "Sociability": 0, "Assertiveness": 2, "Warmth": 1, "Compassion": 0, "Diplomacy": 0, "Trust": 0, "Industriousness": 0, "Order": 0, "Self-Discipline": 0, "Composure": 0, "Optimism": 0, "Adaptability": 0, "Even-Temperedness": 0, "Integrity": 0, "Humility": 0, "Gratitude": 0, "Courage": 2, "Purpose": 0}, "portrait": "The Champion steps forward when something needs a voice. You lead readily, speak up without being asked, and advocate hard for the people and ideas you believe in. You are comfortable out in front and unafraid of a little friction. People look to you when a group needs someone to carry the flag, and you carry it without flinching.", "talents": "You step up, speak up, and advocate hard for people and ideas you believe in. You are comfortable out in front.", "growth": "Your edge is listening. Strong conviction can crowd out quieter voices, so the practice is drawing others out before you push your own view.", "strengths": ["Stepping forward when something needs a voice", "Advocating hard for people and ideas you believe in", "Staying comfortable out in front of a group", "Carrying the flag without flinching from friction"], "watchouts": ["Crowding out quieter voices with strong conviction", "Pushing your view before drawing others out"], "essence": "the nerve to step forward and advocate"}, {"name": "The Caregiver", "slug": "caregiver", "family": "People", "tagline": "Tends to people.", "prototype": {"Curiosity": 0, "Originality": 0, "Aesthetic Sensitivity": 0, "Open-Mindedness": 0, "Reflectiveness": 0, "Focus": 0, "Sociability": 0, "Assertiveness": 0, "Warmth": 2, "Compassion": 2, "Diplomacy": 1, "Trust": 0, "Industriousness": 0, "Order": 0, "Self-Discipline": 0, "Composure": 0, "Optimism": 0, "Adaptability": 0, "Even-Temperedness": 0, "Integrity": 0, "Humility": 0, "Gratitude": 0, "Courage": 0, "Purpose": 0}, "portrait": "The Caregiver is tuned to how people are doing. You notice the feeling behind the words, you give generously of your time and attention, and you make the people around you feel supported and safe. Care is not something you perform, it is your default setting, and it shapes everything you touch.", "talents": "You notice how people feel, support them generously, and make their lives easier. Care is your default setting.", "growth": "Your edge is guarding your own needs. A clean no without an apology protects the care, so it does not quietly drain you.", "strengths": ["Noticing the feeling behind the words", "Giving generously of time and attention", "Making people feel supported and safe", "Anticipating what someone needs before they ask"], "watchouts": ["Giving until your own needs go unmet", "Struggling to say no without an apology"], "essence": "an instinct to notice and support people"}, {"name": "The Confidant", "slug": "confidant", "family": "People", "tagline": "Safe to open up to.", "prototype": {"Curiosity": 0, "Originality": 0, "Aesthetic Sensitivity": 0, "Open-Mindedness": 0, "Reflectiveness": 0, "Focus": 0, "Sociability": 0, "Assertiveness": 0, "Warmth": 1, "Compassion": 1, "Diplomacy": 0, "Trust": 2, "Industriousness": 0, "Order": 0, "Self-Discipline": 0, "Composure": 0, "Optimism": 0, "Adaptability": 0, "Even-Temperedness": 0, "Integrity": 0, "Humility": 0, "Gratitude": 0, "Courage": 0, "Purpose": 0}, "portrait": "The Confidant is who people open up to. You give others the benefit of the doubt, you share yourself readily, and you create a trust that lets people be honest. You hold what you are told with care. In a guarded world, you are a rare and safe place to land.", "talents": "You give people the benefit of the doubt and open up readily, so others feel safe being honest with you. You build deep trust fast.", "growth": "Your edge is discernment. Openness is a gift, and the practice is reading who has earned it before you extend it fully.", "strengths": ["Giving people the benefit of the doubt", "Creating a safe place for others to be honest", "Holding what you are told with care", "Opening up in a way that invites the same"], "watchouts": ["Extending trust before it has been earned", "Taking a betrayal harder than most"], "essence": "a trust that lets people open up"}, {"name": "The Architect", "slug": "architect", "family": "Drive", "tagline": "Builds structure and follows through.", "prototype": {"Curiosity": 0, "Originality": 0, "Aesthetic Sensitivity": 0, "Open-Mindedness": 0, "Reflectiveness": 0, "Focus": 0, "Sociability": 0, "Assertiveness": 0, "Warmth": 0, "Compassion": 0, "Diplomacy": 0, "Trust": 0, "Industriousness": 1, "Order": 2, "Self-Discipline": 2, "Composure": 0, "Optimism": 0, "Adaptability": 0, "Even-Temperedness": 0, "Integrity": 0, "Humility": 0, "Gratitude": 0, "Courage": 0, "Purpose": 0}, "portrait": "The Architect builds order out of chaos. You plan before you move, keep the details others drop, and deliver what you promise, so people trust you to make things actually happen. Structure is not a constraint for you, it is how you turn intention into reality. You are the backbone a team relies on.", "talents": "You build systems, keep the details, and deliver what you promise. People trust you to make things actually happen.", "growth": "Your edge is flexibility. The structure that makes you reliable can also run you, so the practice is bending a plan without it feeling like failure.", "strengths": ["Building systems that make work repeatable", "Keeping the details others drop", "Delivering what you promise, on time", "Turning intention into a plan that runs"], "watchouts": ["Holding a plan too tightly when it needs to bend", "Treating a changed plan as a failure"], "essence": "the structure to make things actually happen"}, {"name": "The Driver", "slug": "driver", "family": "Drive", "tagline": "Ambitious and gets it done.", "prototype": {"Curiosity": 0, "Originality": 0, "Aesthetic Sensitivity": 0, "Open-Mindedness": 0, "Reflectiveness": 0, "Focus": 0, "Sociability": 0, "Assertiveness": 2, "Warmth": 0, "Compassion": 0, "Diplomacy": 0, "Trust": 0, "Industriousness": 2, "Order": 0, "Self-Discipline": 1, "Composure": 0, "Optimism": 0, "Adaptability": 0, "Even-Temperedness": 0, "Integrity": 0, "Humility": 0, "Gratitude": 0, "Courage": 0, "Purpose": 0}, "portrait": "The Driver is built to get things done. You set the bar high, push hard, and turn goals into finished work faster than most people think possible. You are the engine on any team, the one who converts talk into action and keeps momentum from stalling. When something has to move, you are the person others want in the room. Your ambition is not restlessness, it is a genuine drive to make an impact, and people feel pulled forward by it.", "talents": "You set the bar high, push hard, and turn goals into finished work fast. You are the engine on any team.", "growth": "Your edge is pacing and listening. Not every problem needs to be driven through, so the practice is leaving room for other voices and for rest.", "strengths": ["Setting a high bar and clearing it", "Converting talk into finished work fast", "Keeping momentum from stalling", "Owning a goal and driving it to done"], "watchouts": ["Driving through problems that call for patience", "Leaving little room for other voices or for rest"], "essence": "the drive to turn goals into finished work"}, {"name": "The Finisher", "slug": "finisher", "family": "Drive", "tagline": "Closes things out.", "prototype": {"Curiosity": 0, "Originality": 0, "Aesthetic Sensitivity": 0, "Open-Mindedness": 0, "Reflectiveness": 0, "Focus": 2, "Sociability": 0, "Assertiveness": 0, "Warmth": 0, "Compassion": 0, "Diplomacy": 0, "Trust": 0, "Industriousness": 0, "Order": 1, "Self-Discipline": 2, "Composure": 0, "Optimism": 0, "Adaptability": 0, "Even-Temperedness": 0, "Integrity": 0, "Humility": 0, "Gratitude": 0, "Courage": 0, "Purpose": 0}, "portrait": "The Finisher closes what others leave open. You start what needs starting, resist the pull of distraction, and see things through to the last step. Where projects tend to die in the boring middle, you carry them across the line. People know that if it is yours, it will get done.", "talents": "You start what needs starting, resist the pull of distraction, and see things through to done. You are dependable to the last step.", "growth": "Your edge is flexibility and fresh starts. The practice is loosening your grip when a plan needs to change and letting yourself begin new things.", "strengths": ["Carrying projects through the boring middle", "Resisting the pull of distraction", "Seeing things through to the last step", "Being dependable when it is yours to close"], "watchouts": ["Gripping a plan that has stopped working", "Hesitating to start something new and unfinished"], "essence": "the follow-through to see things to done"}, {"name": "The Anchor", "slug": "anchor", "family": "Drive", "tagline": "Steady when things get rocky.", "prototype": {"Curiosity": 0, "Originality": 0, "Aesthetic Sensitivity": 0, "Open-Mindedness": 0, "Reflectiveness": 0, "Focus": 0, "Sociability": 0, "Assertiveness": 0, "Warmth": 0, "Compassion": 0, "Diplomacy": 0, "Trust": 0, "Industriousness": 0, "Order": 0, "Self-Discipline": 0, "Composure": 2, "Optimism": 1, "Adaptability": 0, "Even-Temperedness": 2, "Integrity": 0, "Humility": 0, "Gratitude": 0, "Courage": 0, "Purpose": 0}, "portrait": "The Anchor is the steady one when things get rocky. You keep a clear head under pressure, recover fast from setbacks, and hold an even keel that others lean on. In a storm you are the fixed point, the calm that lets everyone else settle. Your steadiness is a quiet kind of strength.", "talents": "You keep a clear head under pressure, recover fast from setbacks, and hold an even keel that others lean on.", "growth": "Your edge is motion. Calm can quietly become staying put, so the practice is changing one thing you have merely tolerated, just to feel movement.", "strengths": ["Keeping a clear head under pressure", "Recovering fast from setbacks", "Being the fixed point others settle around", "Holding steady when a situation gets tense"], "watchouts": ["Letting calm slide into staying put", "Tolerating a bad situation longer than you should"], "essence": "a steady head under pressure"}, {"name": "The Adapter", "slug": "adapter", "family": "Drive", "tagline": "Adjusts fast when things change.", "prototype": {"Curiosity": 0, "Originality": 0, "Aesthetic Sensitivity": 0, "Open-Mindedness": 0, "Reflectiveness": 0, "Focus": 0, "Sociability": 0, "Assertiveness": 0, "Warmth": 0, "Compassion": 0, "Diplomacy": 0, "Trust": 0, "Industriousness": 0, "Order": 0, "Self-Discipline": 0, "Composure": 0, "Optimism": 1, "Adaptability": 2, "Even-Temperedness": 0, "Integrity": 0, "Humility": 0, "Gratitude": 0, "Courage": 0, "Purpose": 0}, "portrait": "The Adapter is at their best when the ground moves. You adjust to new circumstances faster than most, improvise capably when there is no script, and treat a changed plan as information rather than a crisis. Where others need stability to perform, you perform through the turbulence itself. Teams lean on you in exactly the moments when everything is up in the air.", "talents": "You adjust quickly when plans change, improvise well when there is no script, and stay effective in situations that rattle other people. Change is not a threat to you, it is a condition you work in.", "growth": "Your edge is commitment to a fixed course. Constant adjusting can become drifting, so the practice is holding one plan steady long enough to find out if it works.", "strengths": ["Adjusting quickly when plans change", "Improvising well when there is no script", "Staying effective while everything is in flux", "Treating change as information, not threat"], "watchouts": ["Adjusting so often that nothing gets a fair test", "Mistaking motion for progress"], "essence": "the flexibility to stay effective when plans change"}, {"name": "The Optimist", "slug": "optimist", "family": "Drive", "tagline": "Buoyant and hopeful.", "prototype": {"Curiosity": 0, "Originality": 0, "Aesthetic Sensitivity": 0, "Open-Mindedness": 0, "Reflectiveness": 0, "Focus": 0, "Sociability": 1, "Assertiveness": 0, "Warmth": 1, "Compassion": 0, "Diplomacy": 0, "Trust": our hands.", "talents": "You pair a steady stream of ideas with the discipline to ship them. You do not just imagine what is possible, you make it real.", "growth": "Your edge is focus. The practice is protecting the few ideas worth building and letting the rest go, so you finish more than you start.", "strengths": ["Pairing a stream of ideas with follow-through", "Shipping the thing, not just imagining it", "Turning a concept into something real", "Holding both invention and discipline at once"], "watchouts": ["Starting more than you can finish", "Spreading focus across too many builds"], "essence": "ideas paired with the discipline to build them"}, {"name": "The Steward", "slug": "steward", "family": "Cross", "tagline": "Dependable and caring at once.", "prototype": {"Curiosity": 0, "Originality": 0, "Aesthetic Sensitivity": 0, "Open-Mindedness": 0, "Reflectiveness": 0, "Focus": 0, "Sociability": 0, "Assertiveness": 0, "Warmth": 0, "Compassion": 2, "Diplomacy": 1, "Trust": 0, "Industriousness": 0, "Order": 1, "Self-Discipline": 2, "Composure": 0, "Optimism": 0, "Adaptability": 0, "Even-Temperedness": 0, "Integrity": 0, "Humility": 0, "Gratitude": 0, "Courage": 0, "Purpose": 0}, "portrait": "The Steward carries responsibility for both the work and the people. You deliver reliably and you look out for everyone while you do it, holding a kind of dual duty that others find dependable and rare. You are the one who makes sure the job gets done and no one gets left behind.", "talents": "You carry responsibility for both the work and the people, delivering reliably while looking out for everyone around you.", "growth": "Your edge is limits. Taking care of everything and everyone can empty you, so the practice is setting boundaries that protect what you can give.", "strengths": ["Delivering the work and looking after the people", "Carrying responsibility others can count on", "Making sure no one gets left behind", "Holding standards and warmth together"], "watchouts": ["Taking on everyone's load until you empty", "Setting boundaries too late to protect yourself"], "essence": "responsibility for both the work and the people"}, {"name": "The Mastermind", "slug": "mastermind", "family": "Cross", "tagline": "Strategic and driven.", "prototype": {"Curiosity": 0, "Originality": 0, "Aesthetic Sensitivity": 0, "Open-Mindedness": 0, "Reflectiveness": 2, "Focus": 0, "Sociability": 0, "Assertiveness": 1, "Warmth": 0, "Compassion": 0, "Diplomacy": 0, "Trust": 0, "Industriousness": 2, "Order": 1, "Self-Discipline": 0, "Composure": 0, "Optimism": 0, "Adaptability": 0, "Even-Temperedness": 0, "Integrity": 0, "Humility": 0, "Gratitude": 0, "Courage": 0, "Purpose": 0}, "portrait": "The Mastermind thinks several moves ahead and then executes. You combine careful, strategic planning with the drive to see it through, which lets you turn a complex goal into a sequence of steps that actually happen. You are as comfortable with the long game as with the next move, and you rarely act without a reason. People experience you as someone who is always a beat ahead, quietly connecting where things are now to where they need to go.", "talents": "You plan several moves ahead and then execute. You combine careful strategy with the drive to see it through.", "growth": "Your edge is collaboration and flexibility. The practice is bringing people into the plan early and adapting it as reality pushes back.", "strengths": ["Planning several moves ahead", "Turning a complex goal into ordered steps", "Combining strategy with the drive to execute", "Staying a beat ahead of where things are"], "watchouts": ["Building the plan without the people in it", "Holding the strategy rigid as reality shifts"], "essence": "the foresight to plan several moves ahead"}, {"name": "The Polymath", "slug": "polymath", "family": "Cross", "tagline": "Versatile across the board.", "prototype": {"Curiosity": 0, "Originality": 0, "Aesthetic Sensitivity": 0, "Open-Mindedness": 0, "Reflectiveness": , and would rather be honest than smooth. What people see with you is what they get, and that consistency is why they trust you. In a world of spin, you are refreshingly, sometimes bracingly, straight.", "talents": "You say what is true and present yourself without a front. People trust you because what you say and who you are line up.", "growth": "Your edge is tact. The practice is choosing how and when to deliver hard truths, so honesty lands as care rather than bluntness.", "strengths": ["Saying what is true even when it costs you", "Presenting yourself without a front", "Lining up what you say with who you are", "Being someone people can trust at their word"], "watchouts": ["Delivering hard truths without enough tact", "Mistaking bluntness for honesty"], "essence": "a straightness people can trust"}, {"name": "The Grounded", "slug": "grounded", "family": "Character", "tagline": "Low ego, treats everyone as an equal.", "prototype": {"Curiosity": 0, "Originality": 0, "Aesthetic Sensitivity": 0, "Open-Mindedness": 0, "Reflectiveness": 0, "Focus": 0, "Sociability": 0, "Assertiveness": 0, "Warmth": 0, "Compassion": 0, "Diplomacy": 1, "Trust": 0, "Industriousness": 0, "Order": 0, "Self-Discipline": 0, "Composure": 0, "Optimism": 0, "Adaptability": 0, "Even-Temperedness": 0, "Integrity": 0, "Humility": 2, "Gratitude": 0, "Courage": 0, "Purpose": 0}, "portrait": "The Grounded carries a steady, low ego. You let your work speak, share credit freely, and treat people as equals whatever their status, and you can admit when you are wrong without it shaking you. Your lack of pretension puts people at ease and makes you easy to trust. You do not need the spotlight to know your worth.", "talents": "You let your work speak, share credit freely, and treat people as equals whatever their status. Your steady, low ego makes you easy to trust and work with.", "growth": "Your edge is claiming your worth. The practice is advocating for yourself and owning your wins, so humility does no nd how fast you recover.", "Optimism": "How much you expect good outcomes and hold onto hope.", "Adaptability": "How comfortably you adjust and improvise when things change.", "Even-Temperedness": "How long your fuse is and how patient you stay.", "Integrity": "How honest and authentic you are, even at a cost.", "Humility": "How modest and unpretentious you are about yourself.", "Gratitude": "How much you notice, feel, and express thanks.", "Courage": "How readily you face fear and stand up for what is right.", "Purpose": "How clear your sense of meaning and direction is."}, "likert": ["Very much like me", "Like me", "Somewhat like me", "Neither like nor unlike me", "Somewhat unlike me", "Unlike me", "Very much unlike me"], "booking": "https://api.leadconnectorhq.com/widget/booking/ktnCWMUydaVYrfYSpCdi", "leadEndpoint": "https://kaizen-cognitive-architecture.jameson-84b.workers.dev", "welcome": {"headline": "Your Cognitive Architecture Profile", "subhead": "The full map of how your mind is built: how you think, engage, drive, and what you value. Up to 303 questions across 4 domains and 24 traits; consistent answers shorten it automatically. Take it in one sitting.", "cta": "Begin the profile"}};
const TRAITS=D.traits;
const track=(n,p)=>{try{if(window.gtag)window.gtag("event",n,p||{})}catch(e){}};
const fbqt=(n,s)=>{try{if(window.fbq)window.fbq(s?"track":"trackCustom",n)}catch(e){}};
const ATTR=(()=>{try{const p=new URLSearchParams(location.search);const o={referrer:document.referrer||"",landing_url:location.href};["utm_source","utm_medium","utm_campaign","utm_term","utm_content"].forEach(k=>{const v=p.get(k);if(v)o[k]=v});return o}catch(e){return {}}})();

function convPts(q,a){return q.keying==="R"?a:(6-a)}
function facetArr(answers){const m={};D.questions.forEach(q=>{const a=answers[q.id];
  if(q.kind==="likert"&&a!=null){(m[q.facet]=m[q.facet]||[]).push(convPts(q,a))}});return m}
// A facet can be skipped once 4 of its 6 items are answered consistently (sd <= 1 on the 0-6 scale).
function skippable(q,fs){if(q.kind!=="likert")return false;const arr=fs[q.facet]||[];if(arr.length<4)return false;
  const m=arr.reduce((a,b)=>a+b,0)/arr.length;
  const sd=Math.sqrt(arr.reduce((s,x)=>s+(x-m)**2,0)/arr.length);return sd<=1.0}
function score(answers){
  const fpts={},fn={},fc={}; TRAITS.forEach(t=>fc[t]=0);
  const fs=facetArr(answers);
  D.questions.forEach(q=>{const a=answers[q.id];if(a==null)return;
    if(q.kind==="likert"){const pts=convPts(q,a); fpts[q.facet]=(fpts[q.facet]||0)+pts; fn[q.facet]=(fn[q.facet]||0)+1;}
    else if(q.kind==="fc"&&typeof a==="object"){const om=q.opts[a.m]; if(om) fc[om.trait]=(fc[om.trait]||0)+1;
      const ol=q.opts[a.l]; if(ol) fc[ol.trait]=(fc[ol.trait]||0)-1;}});
  const facet={}; Object.keys(D.facetOf).forEach(f=>facet[f]=fn[f]?fpts[f]/fn[f]:0);
  // Response quality: a facet is inconsistent when its own items disagree strongly (sd >= 2 on the 0-6 scale).
  let flagged=0; const nF=Object.keys(D.facetOf).length;
  Object.keys(D.facetOf).forEach(f=>{const arr=fs[f]||[];if(arr.length<2)return;
    const m=arr.reduce((a,b)=>a+b,0)/arr.length;
    if(Math.sqrt(arr.reduce((s,x)=>s+(x-m)**2,0)/arr.length)>=2)flagged++;});
  const trait={}; for(const d in D.model)for(const t in D.model[d]){const fss=D.model[d][t]; trait[t]=(facet[fss[0]]+facet[fss[1]])/2;}
  const domain={}; for(const d in D.model){const ts=Object.keys(D.model[d]); domain[d]=ts.reduce((s,t)=>s+trait[t],0)/ts.length;}
  // Within-profile z of the Likert traits and of the forced-choice tallies, blended in z-space
  // (85/15) so uneven FC exposure cannot tilt any single trait, then re-standardized.
  const zof=v=>{const vals=TRAITS.map(t=>v[t]||0);const m=vals.reduce((a,b)=>a+b,0)/vals.length;
    const sd=Math.sqrt(vals.reduce((a,b)=>a+(b-m)**2,0)/vals.length)||1;
    const o={};TRAITS.forEach(t=>o[t]=((v[t]||0)-m)/sd);return o;};
  const zL=zof(trait),zF=zof(fc),zmix={};TRAITS.forEach(t=>zmix[t]=0.85*zL[t]+0.15*zF[t]);
  const z=zof(zmix);
  // Raw spikiness of the 22 trait means: near the item-sampling noise floor means no real differentiation.
  const tv=TRAITS.map(t=>trait[t]);const tm=tv.reduce((a,b)=>a+b,0)/tv.length;
  const rawSd=Math.sqrt(tv.reduce((a,b)=>a+(b-tm)**2,0)/tv.length);
  // Full cosine match; an archetype is eligible only if its signature (weight-2) traits
  // average above the person's own mean.
  const nz=Math.sqrt(TRAITS.reduce((s,t)=>s+z[t]*z[t],0))||1;
  const scored=D.archetypes.map(A=>{let dot=0,nw=0,hiS=0,hiN=0;
    TRAITS.forEach(t=>{const w=A.prototype[t]||0;dot+=z[t]*w;nw+=w*w;if(w===2){hiS+=z[t];hiN++;}});
    return {...A,match:nw>0?dot/(nz*Math.sqrt(nw)):0,eligible:nw>0&&(hiN===0||hiS/hiN>0)};});
  const poly=scored.find(A=>A.slug==="polymath");
  const rest=scored.filter(A=>A.slug!=="polymath").sort((a,b)=>b.match-a.match);
  const ranked=rest.filter(A=>A.eligible).concat(rest.filter(A=>!A.eligible));
  // Flat-profile rule: a genuinely undifferentiated profile is The Polymath (thresholds provisional until pilot norms).
  const isFlat=rawSd<0.45||ranked[0].match<0.25;
  const matches=(isFlat&&poly)?[poly].concat(ranked):ranked.concat(poly?[poly]:[]);
  const traitRank=TRAITS.map(t=>({trait:t,score:trait[t],domain:D.traitDomain[t]})).sort((a,b)=>b.score-a.score);
  const facetRank=Object.keys(D.facetOf).map(f=>({facet:f,score:facet[f],trait:D.facetOf[f].trait,domain:D.facetOf[f].domain})).sort((a,b)=>b.score-a.score);
  return {facet,trait,domain,matches,primary:matches[0],mostLike:matches.slice(0,3),leastLike:rest[rest.length-1],
    quality:{flagged,total:nF},
    traitRank,topTraits:traitRank.slice(0,6),lowTraits:traitRank.slice(-4).reverse(),
    facetRank,topFacets:facetRank.slice(0,6)};
}

function Progress({i,n}){return <div className="bar"><i style={{width:Math.round(100*i/n)+"%"}}/></div>}
function Intro({onStart}){return <div className="wrap">
  <span className="badge">Cognitive Architecture Profile</span>
  <h1>{D.welcome.headline}</h1><p>{D.welcome.subhead}</p>
  <p className="muted">Grounded in the Big Five plus a values layer, measured at facet depth (4 domains, 24 traits, 48 facets). There are no right answers. Answer honestly for an accurate map.</p>
  <p style={{marginTop:26}}><button className="cta" onClick={onStart}>{D.welcome.cta}</button></p></div>}
function Question({q,i,n,onPick,onBack}){
  const [most,setMost]=useState(null);
  const isFC=q.kind==="fc";
  const opts = isFC ? q.opts.map((o,idx)=>({label:o.text,val:idx})) : D.likert.map((t,idx)=>({label:t,val:idx}));
  const shown = (isFC&&most!=null) ? opts.filter(o=>o.val!==most) : opts;
  function click(v){
    if(!isFC){onPick(v);return}
    if(most==null){setMost(v)}else{onPick({m:most,l:v})}
  }
  return <div className="wrap"><Progress i={i} n={n}/>
    <h2 style={{marginTop:6}}>{q.text}</h2>
    {isFC&&<p className="muted" style={{marginTop:0}}>{most==null?"First: pick the one MOST like you.":"Now: which of these is LEAST like you?"}</p>}
    {shown.map(o=><button key={o.val} className={"opt"+(isFC?" fc":"")} onClick={()=>click(o.val)}>{o.label}</button>)}
    {(i>0||most!=null) && <button className="ghost" onClick={()=>{if(most!=null)setMost(null);else onBack()}}>Back</button>}</div>}
function Gate({first,setFirst,email,setEmail,consent,setConsent,onSubmit,busy}){
  const ok=first.trim()&&/.+@.+\..+/.test(email)&&consent;
  return <div className="wrap"><span className="badge">Your profile is ready</span><h1>Where should we send it?</h1>
    <p>Add your name and email to see your archetype, your ranked signature strengths, your full 4-domain and 24-trait breakdown, and a personalised summary.</p>
    <input type="text" placeholder="First name" value={first} onChange={e=>setFirst(e.target.value)}/>
    <input type="email" placeholder="Email address" value={email} onChange={e=>setEmail(e.target.value)}/>
    <label className="row"><input type="checkbox" checked={consent} onChange={e=>setConsent(e.target.checked)} style={{marginTop:4}}/>
      <span className="muted">Email me my profile and related resources from Kaizen. Unsubscribe anytime. We never share your information.</span></label>
    <p><button className="cta" disabled={!ok||busy} onClick={onSubmit}>{busy?"One moment...":"See my full profile"}</button></p></div>}
function Bars({items,cls,label,max,defs}){return items.map(it=>(
  <div key={it.key}><div className={"lvl "+cls}><span className="l">{it.label}</span>
    <span className="tk"><i style={{width:Math.round(100*it.score/max)+"%"}}/></span><span>{it.score.toFixed(1)}</span></div>
  {defs&&defs[it.key]&&<div className="tdef">{defs[it.key]}</div>}</div>))}
function ArchCard({a,rank,lead}){
  return <div className="card">
    <h2 style={{fontSize:22,margin:"0 0 2px"}}>{rank}. {a.name}</h2>
    <p className="muted" style={{marginTop:0}}><i>{a.tagline}</i></p>
    <p>{a.portrait}</p>
    {a.strengths&&a.strengths.length>0&&<div><h3>Your talents</h3>
      <ul className="wl">{a.strengths.map((s,i)=><li key={i}>{s}</li>)}</ul></div>}
    {a.watchouts&&a.watchouts.length>0&&<div><h3>Watch-outs</h3>
      <ul className="wl">{a.watchouts.map((s,i)=><li key={i}>{s}</li>)}</ul></div>}
    <h3>Your growth edge</h3><p style={{marginTop:0}}>{a.growth}</p></div>;
}
function Results({r,first,insight,aiBusy}){
  const p=r.primary;
  const a2=r.mostLike[1];
  const tie=a2&&p.slug!=="polymath"&&(p.match-a2.match)<0.04;
  const blend=(a2&&p.essence&&a2.essence)
    ? "Your profile leads with "+p.name+" and is colored by "+a2.name+". In practice, you pair "+p.essence+" with "+a2.essence+"."
      +(tie?" These two are effectively tied in your results, so read them as one combined picture.":"")
    : null;
  return <div className="wrap"><span className="badge">Your archetype</span><h1>{p.name}</h1>
    <p className="muted"><i>{p.tagline}</i></p>
    {blend&&<p className="blend">{blend}</p>}
    {r.quality&&<p className="muted">Response consistency: {r.quality.total-r.quality.flagged} of {r.quality.total} areas internally consistent.{r.quality.flagged>8?" Several areas had mixed answers, so treat those scores as approximate.":""}{r.quality.fast?" This profile was completed quickly; a slower retake may sharpen it.":""}</p>}
    <p>You matched most closely with {p.name}. Below are your three closest archetypes, each written up in full, then your ranked strengths, your growth areas, and your complete domain, trait, and facet breakdown.</p>
    <h2 style={{marginTop:26}}>Your three closest archetypes</h2>
    {r.mostLike.map((a,idx)=><ArchCard key={a.slug} a={a} rank={idx+1}/>)}
    <div className="card"><h3>Least like you</h3>
      <p style={{marginTop:0}}><b>{r.leastLike.name}</b> <span className="muted">({r.leastLike.family})</span>. {r.leastLike.tagline} This shapes you the least, and it is often where a different kind of person complements you well.</p></div>
    <div className="card"><h3>Your signature strengths</h3>
      <p style={{marginTop:0}}>Ranked across all 24 traits:</p>
      {r.topTraits.map((t,idx)=><div className="str" key={t.trait}><span className="rank">{idx+1}</span>
        <span className="nm">{t.trait}</span><span className="sc">{t.score.toFixed(1)}/6 · {t.domain}</span></div>)}</div>
    <div className="card"><h3>Where you'll grow</h3>
      <p style={{marginTop:0}}>{p.growth}</p>
      <p style={{marginTop:12}}>The traits with the most room to develop right now:</p>
      {r.lowTraits.map(t=><div className="str" key={t.trait}><span className="nm">{t.trait}</span><span className="sc">{t.score.toFixed(1)}/6 · {t.domain}</span></div>)}</div>
    <div className="card"><h2 style={{fontSize:18,margin:"0 0 6px"}}>A note written for you, {first}</h2>
      {aiBusy?<p className="muted">Writing your personalised summary...</p>:(insight?<div>{insight.split("\n\n").map((x,i)=><p key={i}>{x}</p>)}</div>:<p className="muted">Your personalised summary will arrive in your inbox with your full profile.</p>)}</div>
    <h2 style={{marginTop:30}}>Your four domains</h2>
    <Bars cls="dom" max={6} items={Object.keys(D.model).map(d=>({key:d,label:d,score:r.domain[d]}))}/>
    <h2 style={{marginTop:30}}>Your 24 traits</h2>
    {Object.keys(D.model).map(d=>(<div key={d}><div className="domhdr">{d}</div>
      <Bars cls="trt" max={6} defs={D.traitDefs} items={Object.keys(D.model[d]).map(t=>({key:t,label:t,score:r.trait[t]}))}/></div>))}
    <h2 style={{marginTop:30}}>Your 48 facets</h2>
    {Object.keys(D.model).map(d=>(<div key={d}><div className="domhdr">{d}</div>
      {Object.keys(D.model[d]).map(t=>(<div key={t}>
        <Bars cls="fct" max={6} items={D.model[d][t].map(f=>({key:f,label:f,score:r.facet[f]}))}/></div>))}</div>))}
    <div style={{textAlign:"center",marginTop:34}}><p>Ready to turn this into a plan? Your profile is the starting point for a cognitive coaching engagement built around exactly this map.</p>
      <a className="cta" href={D.booking} target="_blank" rel="noopener" onClick={()=>track("cta_click",{archetype:p.slug})}>Book your consultation</a></div>
    <p className="disc">This is a reflective profile, not a clinical assessment. For diagnostic questions, consult a qualified professional.</p></div>}

function App(){
  const [screen,setScreen]=useState("intro");const [i,setI]=useState(0);const [answers,setAnswers]=useState({});
  const [first,setFirst]=useState("");const [email,setEmail]=useState("");const [consent,setConsent]=useState(false);
  const [busy,setBusy]=useState(false);const [r,setR]=useState(null);const [insight,setInsight]=useState("");const [aiBusy,setAiBusy]=useState(false);
  const [t0]=useState(()=>Date.now());
  const qs=D.questions,q=qs[i];
  function pick(v){const na={...answers,[q.id]:v};setAnswers(na);track("question_answered",{index:i+1,kind:q.kind});
    const fsn=facetArr(na);let j=i+1;while(j<qs.length&&skippable(qs[j],fsn))j++;
    if(j<qs.length)setI(j);else{track("email_gate_view",{});setScreen("gate")}}
  function goBack(){let j=i-1;while(j>=0&&answers[qs[j].id]==null)j--;if(j>=0)setI(j)}
  function submit(){setBusy(true);const res=score(answers);
    const durationSec=Math.round((Date.now()-t0)/1000);
    const nAns=Object.keys(answers).length||1;
    res.quality.durationSec=durationSec;
    res.quality.fast=durationSec/nAns<1.5;   // under ~1.5s per item means the items were not really read
    setR(res);
    const domains={}; Object.keys(D.model).forEach(d=>domains[d]=+res.domain[d].toFixed(2));
    const strengthsStr=res.topTraits.map(t=>t.trait).join(", ");
    const profileStr="Archetype: "+res.primary.name+" ("+res.primary.tagline+"). "
      +"Secondary: "+((res.mostLike[1]||{}).name||"")+". Least like: "+res.leastLike.name+". "
      +"Domains: "+Object.keys(domains).map(d=>d+" "+domains[d]).join(", ")+". "
      +"Top strengths: "+strengthsStr+". "
      +"Consistency: "+(res.quality.total-res.quality.flagged)+"/"+res.quality.total+" areas.";
    const payload={firstName:first.trim(),email:email.trim(),consent:true,
      archetype:res.primary.name, archetypeSlug:res.primary.slug,
      secondary:(res.mostLike[1]||{}).name||"",
      domains, strengths:strengthsStr, profile:profileStr, durationSec:res.quality.durationSec, attribution:ATTR};
    track("lead_submit",{});track("quiz_complete",{archetype:res.primary.slug});track("outcome",{outcome:res.primary.slug});fbqt("Lead",true);
    setScreen("results");setBusy(false);setAiBusy(true);
    fetch(D.leadEndpoint,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)})
      .then(x=>x.json()).then(x=>setInsight((x&&x.insight)||"")).catch(()=>{}).finally(()=>setAiBusy(false));}
  if(screen==="intro")return <Intro onStart={()=>{track("quiz_start",{});fbqt("QuizStart",false);setScreen("quiz")}}/>;
  if(screen==="quiz"){const fsp=facetArr(answers);let rem=0;
    for(let j=i;j<qs.length;j++)if(!skippable(qs[j],fsp))rem++;
    const done=Object.keys(answers).filter(id=>id!==q.id).length;
    return <Question key={q.id} q={q} i={done} n={done+rem} onPick={pick} onBack={goBack}/>;}
  if(screen==="gate")return <Gate first={first} setFirst={setFirst} email={email} setEmail={setEmail} consent={consent} setConsent={setConsent} onSubmit={submit} busy={busy}/>;
  return <Results r={r} first={first} insight={insight} aiBusy={aiBusy}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
