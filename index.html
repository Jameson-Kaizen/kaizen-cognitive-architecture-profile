cet": "Achievement Striving", "keying": "P", "text": "I aim for more than what is expected."}, {"id": "q216", "kind": "likert", "domain": "Character", "trait": "Integrity", "facet": "Authenticity", "keying": "P", "text": "I present myself honestly, without a front."}, {"id": "q217", "kind": "likert", "domain": "Mind", "trait": "Open-Mindedness", "facet": "Perspective-Taking", "keying": "P", "text": "I can hold two opposing views before deciding."}, {"id": "q218", "kind": "likert", "domain": "People", "trait": "Compassion", "facet": "Helpfulness", "keying": "P", "text": "I go out of my way to support people."}, {"id": "q219", "kind": "likert", "domain": "Drive", "trait": "Order", "facet": "Tidiness", "keying": "P", "text": "I like my surroundings orderly."}, {"id": "q220", "kind": "likert", "domain": "Character", "trait": "Humility", "facet": "Unpretentiousness", "keying": "P", "text": "I do not think I am better than other people."}, {"id": "q221", "kind": "fc", "text": "When something frightening comes up, I", "opts": [{"trait": "Courage", "text": "Face it head on"}, {"trait": "Reflectiveness", "text": "Analyze it first"}, {"trait": "Optimism", "text": "Assume it will work out"}, {"trait": "Diplomacy", "text": "Talk it through with someone"}]}, {"id": "q222", "kind": "likert", "domain": "Mind", "trait": "Reflectiveness", "facet": "Introspection", "keying": "P", "text": "I notice why I feel the way I do."}, {"id": "q223", "kind": "likert", "domain": "People", "trait": "Diplomacy", "facet": "Cooperation", "keying": "P", "text": "I let small disagreements go."}, {"id": "q224", "kind": "likert", "domain": "Drive", "trait": "Self-Discipline", "facet": "Follow-Through", "keying": "P", "text": "I finish what I commit to."}, {"id": "q225", "kind": "likert", "domain": "Character", "trait": "Gratitude", "facet": "Appreciation of Others", "keying": "P", "text": "I express thanks readily."}, {"id": "q226", "kind": "likert", "domain": "Mind", "trait": "Focus", "facet": "Task Persistence", "keying": "P", "text": "I finish what I start once I begin."}, {"id": "q227", "kind": "likert", "domain": "People", "trait": "Trust", "facet": "Openness to Others", "keying": "P", "text": "I let new people in fairly quickly."}, {"id": "q228", "kind": "likert", "domain": "Drive", "trait": "Composure", "facet": "Recovery", "keying": "P", "text": "A rough moment rarely turns into a rough week."}, {"id": "q229", "kind": "likert", "domain": "Character", "trait": "Courage", "facet": "Facing Fear", "keying": "P", "text": "I step toward difficulty instead of away from it."}, {"id": "q230", "kind": "likert", "domain": "Mind", "trait": "Curiosity", "facet": "Love of Learning", "keying": "R", "text": "Studying something new feels like a chore to me."}, {"id": "q231", "kind": "likert", "domain": "People", "trait": "Sociability", "facet": "Social Energy", "keying": "R", "text": "A busy room tires me quickly."}, {"id": "q232", "kind": "likert", "domain": "Drive", "trait": "Optimism", "facet": "Hopefulness", "keying": "P", "text": "I trust that better days are ahead."}, {"id": "q233", "kind": "likert", "domain": "Character", "trait": "Purpose", "facet": "Direction", "keying": "P", "text": "I let my values steer my decisions."}, {"id": "q234", "kind": "likert", "domain": "Mind", "trait": "Originality", "facet": "Unconventionality", "keying": "R", "text": "I feel uneasy straying from the norm."}, {"id": "q235", "kind": "likert", "domain": "People", "trait": "Assertiveness", "facet": "Speaking Up", "keying": "R", "text": "I stay quiet rather than rock the boat."}, {"id": "q236", "kind": "likert", "domain": "Drive", "trait": "Industriousness", "facet": "Achievement Striving", "keying": "R", "text": "I do not set ambitious goals for myself."}, {"id": "q237", "kind": "likert", "domain": "Character", "trait": "Integrity", "facet": "Authenticity", "keying": "R", "text": "I pretend to be someone I am not to get ahead."}, {"id": "q238", "kind": "fc", "text": "What I value most in other people is", "opts": [{"trait": "Integrity", "text": "Honesty"}, {"trait": "Compassion", "text": "Kindness"}, {"trait": "Industriousness", "text": "Reliability"}, {"trait": "Originality", "text": "Creativity"}]}, {"id": "q239", "kind": "likert", "domain": "Mind", "trait": "Aesthetic Sensitivity", "facet": "Artistic Interest", "keying": "R", "text": "Creative work does not draw me in."}, {"id": "q240", "kind": "likert", "domain": "People", "trait": "Warmth", "facet": "Expressiveness", "keying": "R", "text": "I rarely show warmth outwardly."}, {"id": "q241", "kind": "likert", "domain": "Drive", "trait": "Order", "facet": "Tidiness", "keying": "R", "text": "Keeping things tidy is not a priority for me."}, {"id": "q242", "kind": "likert", "domain": "Character", "trait": "Humility", "facet": "Unpretentiousness", "keying": "R", "text": "I expect to be treated as more important than others."}, {"id": "q243", "kind": "likert", "domain": "Mind", "trait": "Open-Mindedness", "facet": "Perspective-Taking", "keying": "R", "text": "I judge quickly from my own vantage point."}, {"id": "q244", "kind": "likert", "domain": "People", "trait": "Compassion", "facet": "Helpfulness", "keying": "R", "text": "Other people's problems are not my concern."}, {"id": "q245", "kind": "likert", "domain": "Drive", "trait": "Self-Discipline", "facet": "Follow-Through", "keying": "R", "text": "People cannot always rely on me to deliver."}, {"id": "q246", "kind": "likert", "domain": "Character", "trait": "Gratitude", "facet": "Appreciation of Others", "keying": "R", "text": "I take the people who support me for granted."}, {"id": "q247", "kind": "likert", "domain": "Mind", "trait": "Reflectiveness", "facet": "Introspection", "keying": "R", "text": "I do not spend much time looking inward."}, {"id": "q248", "kind": "likert", "domain": "People", "trait": "Diplomacy", "facet": "Cooperation", "keying": "R", "text": "I will argue a point until I win."}, {"id": "q249", "kind": "likert", "domain": "Drive", "trait": "Composure", "facet": "Recovery", "keying": "R", "text": "One bad thing can throw off my whole week."}, {"id": "q250", "kind": "likert", "domain": "Character", "trait": "Courage", "facet": "Facing Fear", "keying": "R", "text": "I shrink from a challenge when it feels risky."}, {"id": "q251", "kind": "likert", "domain": "Mind", "trait": "Focus", "facet": "Task Persistence", "keying": "R", "text": "I leave things half-finished."}, {"id": "q252", "kind": "likert", "domain": "People", "trait": "Trust", "facet": "Openness to Others", "keying": "R", "text": "I hold people at arm's length."}, {"id": "q253", "kind": "likert", "domain": "Drive", "trait": "Optimism", "facet": "Hopefulness", "keying": "R", "text": "I doubt that effort changes much."}, {"id": "q254", "kind": "likert", "domain": "Character", "trait": "Purpose", "facet": "Direction", "keying": "R", "text": "I am not sure where I am headed in life."}, {"id": "q255", "kind": "fc", "text": "A gift of free time would go to", "opts": [{"trait": "Curiosity", "text": "Learning something"}, {"trait": "Warmth", "text": "People I love"}, {"trait": "Order", "text": "Projects and organizing"}, {"trait": "Composure", "text": "Rest"}]}, {"id": "q256", "kind": "likert", "domain": "Mind", "trait": "Curiosity", "facet": "Love of Learning", "keying": "P", "text": "Learning something new genuinely excites me."}, {"id": "q257", "kind": "likert", "domain": "People", "trait": "Sociability", "facet": "Social Energy", "keying": "P", "text": "I feel charged up after time with others."}, {"id": "q258", "kind": "likert", "domain": "Mind", "trait": "Originality", "facet": "Unconventionality", "keying": "P", "text": "I am comfortable being the odd one out."}, {"id": "q259", "kind": "likert", "domain": "People", "trait": "Assertiveness", "facet": "Speaking Up", "keying": "P", "text": "I push back when I see it differently."}, {"id": "q260", "kind": "likert", "domain": "Mind", "trait": "Aesthetic Sensitivity", "facet": "Artistic   <span className="badge">Cognitive Architecture Profile</span>
  <h1>{D.welcome.headline}</h1><p>{D.welcome.subhead}</p>
  <p className="muted">Grounded in the Big Five plus a values layer, measured at facet depth (4 domains, 22 traits, 44 facets). There are no right answers. Answer honestly for an accurate map.</p>
  <p style={{marginTop:26}}><button className="cta" onClick={onStart}>{D.welcome.cta}</button></p></div>}
function Question({q,i,n,onPick,onBack}){
  const opts = q.kind==="likert" ? D.likert.map((t,idx)=>({label:t,val:idx})) : q.opts.map((o,idx)=>({label:o.text,val:idx}));
  return <div className="wrap"><Progress i={i} n={n}/><div className="muted">Question {i+1} of {n}</div>
    <h2 style={{marginTop:6}}>{q.text}</h2>
    {opts.map(o=><button key={o.val} className={"opt"+(q.kind==="fc"?" fc":"")} onClick={()=>onPick(o.val)}>{o.label}</button>)}
    {i>0 && <button className="ghost" onClick={onBack}>Back</button>}</div>}
function Gate({first,setFirst,email,setEmail,consent,setConsent,onSubmit,busy}){
  const ok=first.trim()&&/.+@.+\..+/.test(email)&&consent;
  return <div className="wrap"><span className="badge">Your profile is ready</span><h1>Where should we send it?</h1>
    <p>Add your name and email to see your archetype, your ranked signature strengths, your full 4-domain and 22-trait breakdown, and a personalised summary.</p>
    <input type="text" placeholder="First name" value={first} onChange={e=>setFirst(e.target.value)}/>
    <input type="email" placeholder="Email address" value={email} onChange={e=>setEmail(e.target.value)}/>
    <label className="row"><input type="checkbox" checked={consent} onChange={e=>setConsent(e.target.checked)} style={{marginTop:4}}/>
      <span className="muted">Email me my profile and related resources from Kaizen. Unsubscribe anytime. We never share your information.</span></label>
    <p><button className="cta" disabled={!ok||busy} onClick={onSubmit}>{busy?"One moment...":"See my full profile"}</button></p></div>}
function Bars({items,cls,label,max}){return items.map(it=>(
  <div className={"lvl "+cls} key={it.key}><span className="l">{it.label}</span>
    <span className="tk"><i style={{width:Math.round(100*it.score/max)+"%"}}/></span><span>{it.score.toFixed(1)}</span></div>))}
function Results({r,first,insight,aiBusy}){
  const p=r.primary;
  return <div className="wrap"><span className="badge">Your archetype</span><h1>{p.name}</h1>
    <p className="muted"><i>{p.tagline}</i></p>
    <div className="card"><h3>Most like you</h3>
      {r.mostLike.map((m,idx)=><p key={m.slug} style={{margin:"2px 0"}}><b>{idx+1}. {m.name}</b> <span className="muted">({m.family})</span></p>)}
      <h3>Least like you</h3><p style={{marginTop:0}}><b>{r.leastLike.name}</b>. That shapes you least, and is often where a different kind of person complements you.</p></div>
    <div className="card"><h3>Your talents</h3><p style={{marginTop:0}}>{p.talents}</p>
      <p style={{marginTop:12}}>Your top signature strengths, ranked across all 22 traits:</p>
      {r.topTraits.map((t,idx)=><div className="str" key={t.trait}><span className="rank">{idx+1}</span>
        <span className="nm">{t.trait}</span><span className="sc">{t.score.toFixed(1)}/6 · {t.domain}</span></div>)}</div>
    <div className="card"><h3>Where you'll grow</h3><p style={{marginTop:0}}>{p.growth}</p>
      <p style={{marginTop:12}}>The traits with the most room to develop right now:</p>
      {r.lowTraits.map(t=><div className="str" key={t.trait}><span className="nm">{t.trait}</span><span className="sc">{t.score.toFixed(1)}/6 · {t.domain}</span></div>)}</div>
    <div className="card"><h2 style={{fontSize:18,margin:"0 0 6px"}}>A note written for you, {first}</h2>
      {aiBusy?<p className="muted">Writing your personalised summary...</p>:(insight?<div>{insight.split("\n\n").map((x,i)=><p key={i}>{x}</p>)}</div>:<p className="muted">Your personalised summary will arrive in your inbox with your full profile.</p>)}</div>
    <h2 style={{marginTop:30}}>Your four domains</h2>
    <Bars cls="dom" max={6} items={Object.keys(D.model).map(d=>({key:d,label:d,score:r.domain[d]}))}/>
    <h2 style={{marginTop:30}}>Your 22 traits</h2>
    {Object.keys(D.model).map(d=>(<div key={d}><div className="domhdr">{d}</div>
      <Bars cls="trt" max={6} items={Object.keys(D.model[d]).map(t=>({key:t,label:t,score:r.trait[t]}))}/></div>))}
    <h2 style={{marginTop:30}}>Your 44 facets</h2>
    {Object.keys(D.model).map(d=>(<div key={d}><div className="domhdr">{d}</div>
      {Object.keys(D.model[d]).map(t=>(<div key={t}>
        <Bars cls="fct" max={6} items={D.model[d][t].map(f=>({key:f,label:f,score:r.facet[f]}))}/></div>))}</div>))}
    <div style={{textAlign:"center",marginTop:34}}><p>Ready to turn this into a plan? Your profile is the starting point for a cognitive coaching engagement built around exactly this map.</p>
      <a className="cta" href={D.booking} target="_blank" rel="noopener" onClick={()=>track("cta_click",{archetype:p.slug})}>Book your consultation</a></div>
    <p className="disc">This is a reflective profile, not a clinical assessment. For diagnostic questions, consult a qualified professional.</p></div>}

function App(){
  const [screen,setScreen]=useState("intro");const [i,setI]=useState(0);const [answers,setAnswers]=useState({});
  const [first,setFirst]=useState("");const [email,setEmail]=useState("");const [consent,setConsent]=useState(false);
  const [busy,setBusy]=useState(false);const [r,setR]=useState(null);const [insight,setInsight]=useState("");const [aiBusy,setAiBusy]=useState(false);
  const qs=D.questions,q=qs[i];
  function pick(v){setAnswers({...answers,[q.id]:v});track("question_answered",{index:i+1,kind:q.kind});
    if(i+1<qs.length)setI(i+1);else{track("email_gate_view",{});setScreen("gate")}}
  function submit(){setBusy(true);const res=score(answers);setR(res);
    const domains={}; Object.keys(D.model).forEach(d=>domains[d]=+res.domain[d].toFixed(2));
    const strengthsStr=res.topTraits.map(t=>t.trait).join(", ");
    const profileStr="Archetype: "+res.primary.name+" ("+res.primary.tagline+"). "
      +"Secondary: "+((res.mostLike[1]||{}).name||"")+". Least like: "+res.leastLike.name+". "
      +"Domains: "+Object.keys(domains).map(d=>d+" "+domains[d]).join(", ")+". "
      +"Top strengths: "+strengthsStr+".";
    const payload={firstName:first.trim(),email:email.trim(),consent:true,
      archetype:res.primary.name, archetypeSlug:res.primary.slug,
      secondary:(res.mostLike[1]||{}).name||"",
      domains, strengths:strengthsStr, profile:profileStr, attribution:ATTR};
    track("lead_submit",{});track("quiz_complete",{archetype:res.primary.slug});track("outcome",{outcome:res.primary.slug});fbqt("Lead",true);
    setScreen("results");setBusy(false);setAiBusy(true);
    fetch(D.leadEndpoint,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)})
      .then(x=>x.json()).then(x=>setInsight((x&&x.insight)||"")).catch(()=>{}).finally(()=>setAiBusy(false));}
  if(screen==="intro")return <Intro onStart={()=>{track("quiz_start",{});fbqt("QuizStart",false);setScreen("quiz")}}/>;
  if(screen==="quiz")return <Question q={q} i={i} n={qs.length} onPick={pick} onBack={()=>i>0&&setI(i-1)}/>;
  if(screen==="gate")return <Gate first={first} setFirst={setFirst} email={email} setEmail={setEmail} consent={consent} setConsent={setConsent} onSubmit={submit} busy={busy}/>;
  return <Results r={r} first={first} insight={insight} aiBusy={aiBusy}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
