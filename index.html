atience", "keying": "P", "text": "I remain patient when someone needs more time than I expected."}, {"id": "q88", "kind": "likert", "domain": "Character", "trait": "Integrity", "facet": "Honesty", "keying": "P", "text": "I report facts accurately even when a more flattering version would benefit me."}, {"id": "q89", "kind": "likert", "domain": "Mind", "trait": "Open-Mindedness", "facet": "Intellectual Openness", "keying": "R", "text": "I rarely change my mind once it is made up."}, {"id": "q90", "kind": "likert", "domain": "People", "trait": "Compassion", "facet": "Empathy", "keying": "R", "text": "I often miss how others are feeling."}, {"id": "q91", "kind": "likert", "domain": "Drive", "trait": "Industriousness", "facet": "Work Ethic", "keying": "R", "text": "My effort is inconsistent unless a deadline is close."}, {"id": "q92", "kind": "likert", "domain": "Character", "trait": "Humility", "facet": "Modesty", "keying": "P", "text": "I am comfortable when others get the spotlight."}, {"id": "q93", "kind": "likert", "domain": "Mind", "trait": "Reflectiveness", "facet": "Deliberation", "keying": "R", "text": "I make quick choices without much thought."}, {"id": "q94", "kind": "likert", "domain": "People", "trait": "Diplomacy", "facet": "Politeness", "keying": "R", "text": "I lose my manners when I am annoyed."}, {"id": "q95", "kind": "fc", "text": "I feel most like myself when I am", "opts": [{"trait": "Curiosity", "text": "Learning or creating"}, {"trait": "Sociability", "text": "With a lively group"}, {"trait": "Self-Discipline", "text": "Making real progress"}, {"trait": "Gratitude", "text": "Appreciating what I have"}]}, {"id": "q96", "kind": "likert", "domain": "Drive", "trait": "Order", "facet": "Structure", "keying": "R", "text": "I rarely break a large task into smaller steps."}, {"id": "q97", "kind": "likert", "domain": "Character", "trait": "Gratitude", "facet": "Thankfulness", "keying": "P", "text": "I feel genuine gratitude for what I have."}, {"id": "q98", "kind": "likert", "domain": "Mind", "trait": "Focus", "facet": "Concentration", "keying": "R", "text": "Small distractions pull me off track."}, {"id": "q99", "kind": "likert", "domain": "People", "trait": "Trust", "facet": "Good Faith", "keying": "R", "text": "I look for self-interest behind generous behavior."}, {"id": "q100", "kind": "likert", "domain": "Drive", "trait": "Self-Discipline", "facet": "Self-Control", "keying": "R", "text": "I find it hard to resist a temptation."}, {"id": "q101", "kind": "likert", "domain": "Character", "trait": "Courage", "facet": "Moral Courage", "keying": "P", "text": "I maintain an ethical boundary when others pressure me to cross it."}, {"id": "q102", "kind": "likert", "domain": "Mind", "trait": "Curiosity", "facet": "Inquisitiveness", "keying": "P", "text": "When something puzzles me, I look for an explanation."}, {"id": "q103", "kind": "likert", "domain": "People", "trait": "Sociability", "facet": "Gregariousness", "keying": "P", "text": "I make plans to see people often."}, {"id": "q104", "kind": "likert", "domain": "Drive", "trait": "Composure", "facet": "Calm Under Pressure", "keying": "R", "text": "A tight deadline stresses me out."}, {"id": "q105", "kind": "likert", "domain": "Character", "trait": "Purpose", "facet": "Meaning", "keying": "P", "text": "I have a strong sense of meaning in what I do."}, {"id": "q106", "kind": "likert", "domain": "Mind", "trait": "Originality", "facet": "Idea Generation", "keying": "P", "text": "I connect ideas from different fields into something new."}, {"id": "q107", "kind": "likert", "domain": "People", "trait": "Assertiveness", "facet": "Taking Charge", "keying": "P", "text": "I am comfortable being in charge."}, {"id": "q108", "kind": "likert", "domain": "Drive", "trait": "Optimism", "facet": "Positive Outlook", "keying": "R", "text": "Negative details stand out to me more than positive ones."}, {"id": "q109", "kind": "likert", "domain": "Character", "trait": "Integrity", "facet": "Honesty", "keying": "R", "text": "I leave out important details when the full truth would be inconvenient."}, {"id": "q110", "kind": "likert", "domain": "Mind", "trait": "Aesthetic Sensitivity", "facet": "Appreciation of Beauty", "keying": "P", "text": "Beauty can stir a strong feeling in me."}, {"id": "q111", "kind": "likert", "domain": "People", "trait": "Warmth", "facet": "Approachability", "keying": "P", "text": "I greet unfamiliar people in a friendly way."}, {"id": "q112", "kind": "likert", "domain": "Drive", "trait": "Adaptability", "facet": "Comfort with Change", "keying": "R", "text": "I need a while to adjust when plans change."}, {"id": "q113", "kind": "likert", "domain": "Character", "trait": "Humility", "facet": "Modesty", "keying": "R", "text": "I actively seek opportunities to be admired for what I have done."}, {"id": "q114", "kind": "fc", "text": "In a disagreement, I usually", "opts": [{"trait": "Assertiveness", "text": "State my case firmly"}, {"trait": "Diplomacy", "text": "Look for a compromise"}, {"trait": "Open-Mindedness", "text": "Try to see their side"}, {"trait": "Humility", "text": "Admit what I got wrong"}]}, {"id": "q115", "kind": "likert", "domain": "Mind", "trait": "Open-Mindedness", "facet": "Intellectual Openness", "keying": "P", "text": "I like considering possibilities I had not thought of."}, {"id": "q116", "kind": "likert", "domain": "People", "trait": "Compassion", "facet": "Empathy", "keying": "P", "text": "I pick up on the mood in a room quickly."}, {"id": "q117", "kind": "likert", "domain": "Drive", "trait": "Even-Temperedness", "facet": "Patience", "keying": "R", "text": "Slow progress wears my patience thin."}, {"id": "q118", "kind": "likert", "domain": "Character", "trait": "Gratitude", "facet": "Thankfulness", "keying": "R", "text": "I seldom reflect on benefits I have received."}, {"id": "q119", "kind": "likert", "domain": "Mind", "trait": "Reflectiveness", "facet": "Deliberation", "keying": "P", "text": "Before choosing, I compare more than one option."}, {"id": "q120", "kind": "likert", "domain": "People", "trait": "Diplomacy", "facet": "Politeness", "keying": "P", "text": "I keep my tone civil in a disagreement."}, {"id": "q121", "kind": "likert", "domain": "Drive", "trait": "Industriousness", "facet": "Work Ethic", "keying": "P", "text": "I keep working steadily even when a deadline is far away."}, {"id": "q122", "kind": "likert", "domain": "Character", "trait": "Courage", "facet": "Moral Courage", "keying": "R", "text": "I withdraw an ethical objection when others strongly resist it."}, {"id": "q123", "kind": "likert", "domain": "Mind", "trait": "Focus", "facet": "Concentration", "keying": "P", "text": "I can keep my attention on one task without drifting."}, {"id": "q124", "kind": "likert", "domain": "People", "trait": "Trust", "facet": "Good Faith", "keying": "P", "text": "I start new relationships expecting fair treatment."}, {"id": "q125", "kind": "likert", "domain": "Drive", "trait": "Order", "facet": "Structure", "keying": "P", "text": "I work best when my day has a clear structure."}, {"id": "q126", "kind": "likert", "domain": "Character", "trait": "Purpose", "facet": "Meaning", "keying": "R", "text": "What I do rarely feels meaningful."}, {"id": "q127", "kind": "likert", "domain": "Mind", "trait": "Curiosity", "facet": "Inquisitiveness", "keying": "R", "text": "I take most things at face value."}, {"id": "q128", "kind": "likert", "domain": "People", "trait": "Sociability", "facet": "Gregariousness", "keying": "R", "text": "I deliberately limit how much time I spend in groups."}, {"id": "q129", "kind": "likert", "domain": "Drive", "trait": "Self-Discipline", "facet": "Self-Control", "keying": "P", "text": "I can make myself wait for a bigger payoff."}, {"id": "q130", "kind": "likert", "domain": "Character", "trait": "Integrity", "facet": "Authenticity", "keying": "P", "text": "My behavior reflects the same core values across social settings."}, {"id": "q131", "kind": " rt", "domain": "People", "trait": "Compassion", "facet": "Empathy", "keying": "R", "text": "I have trouble imagining what someone is going through when they struggle."}, {"id": "q142", "kind": "likert", "domain": "Drive", "trait": "Adaptability", "facet": "Comfort with Change", "keying": "P", "text": "I remain comfortable while adjusting to an unfamiliar situation."}, {"id": "q143", "kind": "likert", "domain": "Character", "trait": "Courage", "facet": "Facing Fear", "keying": "P", "text": "I face challenges that scare me rather than avoid them."}, {"id": "q144", "kind": "likert", "domain": "Mind", "trait": "Reflectiveness", "facet": "Deliberation", "keying": "R", "text": "I act before considering likely consequences."}, {"id": "q145", "kind": "likert", "domain": "People", "trait": "Diplomacy", "facet": "Politeness", "keying": "R", "text": "I say sharp things when I am frustrated."}, {"id": "q146", "kind": "likert", "domain": "Drive", "trait": "Even-Temperedness", "facet": "Patience", "keying": "P", "text": "Waiting in a slow line does not bother me much."}, {"id": "q147", "kind": "likert", "domain": "Character", "trait": "Purpose", "facet": "Direction", "keying": "P", "text": "I can identify the next step toward the future I want."}, {"id": "q148", "kind": "likert", "domain": "Mind", "trait": "Focus", "facet": "Concentration", "keying": "R", "text": "My attention fades during tasks that require sustained concentration."}, {"id": "q149", "kind": "likert", "domain": "People", "trait": "Trust", "facet": "Good Faith", "keying": "R", "text": "I often suspect hidden motives behind what people tell me."}, {"id": "q150", "kind": "likert", "domain": "Drive", "trait": "Industriousness", "facet": "Work Ethic", "keying": "R", "text": "I reduce my effort when expectations are not enforced."}, {"id": "q151", "kind": "likert", "domain": "Character", "trait": "Integrity", "facet": "Authenticity", "keying": "R", "text": "I put on a version of myself to impress people."}, {"id": "q15 function convPts(q,a){return q.keying==="R"?a:(6-a)}
// Pilot mode (cap-score-3): no adaptive stopping, forced-choice weight zero.
// FC blocks are still asked and their tallies are logged for research, but they
// do not influence any reported score or the pattern match.
function score(answers){
  // fail closed: a result is only computed from a complete response set
  const missing=D.questions.filter(q=>answers[q.id]==null);
  if(missing.length) throw new Error("incomplete responses: "+missing.length);
  const fpts={},fn={},farr={},fcM={},fcL={};
  TRAITS.forEach(t=>{fcM[t]=0;fcL[t]=0});
  D.questions.forEach(q=>{const a=answers[q.id];
    if(q.kind==="likert"){
      if(!Number.isInteger(a)||a<0||a>6) throw new Error("bad answer "+q.id);
      const pts=convPts(q,a); fpts[q.facet]=(fpts[q.facet]||0)+pts; fn[q.facet]=(fn[q.facet]||0)+1;
      (farr[q.facet]=farr[q.facet]||[]).push(pts);
    } else if(q.kind==="fc"){
      if(typeof a!=="object"||a.m===a.l) throw new Error("bad fc "+q.id);
      const om=q.opts[a.m]; if(om) fcM[om.trait]+=1;
      const ol=q.opts[a.l]; if(ol) fcL[ol.trait]+=1;
    }});
  const facet={}; Object.keys(D.facetOf).forEach(f=>{
    if(!fn[f]||fn[f]<6) throw new Error("incomplete facet "+f);
    facet[f]=fpts[f]/fn[f];});
  // Answer pattern check: a facet is noted when its own items disagree strongly.
  // This is within-person answer dispersion, not a reliability statistic.
  let flagged=0; const nF=Object.keys(D.facetOf).length;
  Object.keys(D.facetOf).forEach(f=>{const arr=farr[f];
    const m=arr.reduce((a,b)=>a+b,0)/arr.length;
    if(Math.sqrt(arr.reduce((s,x)=>s+(x-m)**2,0)/arr.length)>=2)flagged++;});
  const trait={}; for(const d in D.model)for(const t in D.model[d]){const fs=D.model[d][t]; trait[t]=(facet[fs[0]]+facet[fs[1]])/2;}
  const domain={}; for(const d in D.model){const ts=Object.keys(D.model[d]); domain[d]=ts.reduce((s,t)=>s+trait[t],0)/ts.length;}
  // Within-profile z across the 24 trait means (Likert only; FC weight is zero in the pilot).
  const vals=TRAITS.map(t=>trait[t]); const mean=vals.reduce((a,b)=>a+b,0)/vals.length;
  const sd=Math.sqrt(vals.reduce((a,b)=>a+(b-mean)**2,0)/vals.length)||1;
  const z={}; TRAITS.forEach(t=>z[t]=(trait[t]-mean)/sd);
  const rawSd=Math.sqrt(vals.reduce((a,b)=>a+(b-mean)**2,0)/vals.length);
  // Profile correlation: cosine of the person's z-vector with each CENTERED prototype.
  const nz=Math.sqrt(TRAITS.reduce((s,t)=>s+z[t]*z[t],0))||1;
  const ranked=D.archetypes.map(A=>{
    const wm=TRAITS.reduce((s,t)=>s+(A.prototype[t]||0),0)/TRAITS.length;
    let dot=0,nw=0;
    TRAITS.forEach(t=>{const w=(A.prototype[t]||0)-wm;dot+=z[t]*w;nw+=w*w});
    return {...A,match:nw>0?dot/(nz*Math.sqrt(nw)):0};}).sort((a,b)=>b.match-a.match);
  // Result routes (thresholds provisional until pilot data):
  // even = ratings relatively even; blend = clear shape but no close prototype; else archetype.
  let route="archetype";
  if(rawSd<0.45) route="even";
  else if(ranked[0].match<0.25) route="blend";
  const traitRank=TRAITS.map(t=>({trait:t,score:trait[t],z:z[t],domain:D.traitDomain[t]})).sort((a,b)=>b.score-a.score);
  const facetRank=Object.keys(D.facetOf).map(f=>({facet:f,score:facet[f],trait:D.facetOf[f].trait,domain:D.facetOf[f].domain})).sort((a,b)=>b.score-a.score);
  // Conditional watch-outs: only contrasts the person's own scores support (max 2).
  const costs=D.contrasts.filter(c=>z[c.hi]>=0.6&&z[c.lo]<=-0.3)
    .sort((a,b)=>(z[b.hi]-z[b.lo])-(z[a.hi]-z[a.lo])).slice(0,2);
  return {facet,trait,domain,z,rawSd,ranked,route,primary:ranked[0],second:ranked[1],
    quality:{flagged,total:nF},costs,fcM,fcL,
    traitRank,topTraits:traitRank.slice(0,6),lowTraits:traitRank.slice(-4).reverse(),facetRank};
}
// Evidence chips: facet contrasts inside the primary pattern's signature traits.
function evidence(r){
  const out=[];
  const hi=TRAITS.filter(t=>(r.primary.prototype[t]||0)===2);
  hi.forEach(t=>{const fs=(D.model[D.traitDomain[t]]||{})[t];if(!fs)return;
    const a=r.facet[fs[0]],b=r.facet[fs[1]];
    if(Math.abs(a-b)>=0.8){const lead=a>b?fs[0]:fs[1],lag=a>b?fs[1]:fs[0];
      out.push({t,txt:lead+" led "+lag});}
    else out.push({t,txt:"balanced across "+fs[0]+" and "+fs[1]});});
  // one differentiator between the top two patterns
  if(r.second){const diff=TRAITS.filter(t=>(r.primary.prototype[t]||0)>(r.second.prototype[t]||0))
      .sort((a,b)=>r.z[b]-r.z[a])[0];
    if(diff)out.push({t:diff,txt:"separates "+r.primary.name+" from "+r.second.name+" in your answers"});}
  return out.slice(0,4);
}

function Question({q,i,n,onPick,onBack}){
  const [most,setMost]=useState(null);
  const isFC=q.kind==="fc";
  const opts = isFC ? q.opts.map((o,idx)=>({label:o.text,val:idx})) : D.likert.map((t,idx)=>({label:t,val:idx}));
  const shown = (isFC&&most!=null) ? opts.filter(o=>o.val!==most) : opts;
  function click(v){
    if(!isFC){onPick(v);return}
    if(most==null){setMost(v)}else{onPick({m:most,l:v})}
  }
  return <div className="wrap"><Progress i={i} n={n}/>
    <h2 style={{marginTop:6}}>{q.text}</h2>
    {isFC&&<p className="muted" style={{marginTop:0}}>{most==null?"First: pick the one MOST like you.":"Now: which of these is LEAST like you?"}</p>}
    {shown.map(o=><button key={o.val} className={"opt"+(isFC?" fc":"")} onClick={()=>click(o.val)}>{o.label}</button>)}
    {(i>0||most!=null) && <button className="ghost" onClick={()=>{if(most!=null)setMost(null);else onBack()}}>Back</button>}</div>}

  if(r.route==="blend")return <div><span className="badge">Your result</span><h1>A combination our archetypes do not capture</h1>
    <p>Your responses form a distinctive pattern, but it does not line up closely with one of our preset archetypes. That is a limitation of the archetype set, not a problem with your profile. Your trait relationships below are the better place to focus.</p></div>;
  const p=r.primary,s=r.second;
  const tied=s&&(p.match-s.match)<0.04;
  return <div><span className="badge">{tied?"Your two leading patterns":"Your leading pattern"}</span>
    <h1>{tied?p.name+" and "+s.name:p.name}</h1>
    <p className="muted"><i>{p.tagline}</i></p>

  </div>;
}

    <p className="disc">This is a reflective profile, not a clinical assessment. For diagnostic questions, consult a qualified professional.</p></div>}

function App(){
  const [screen,setScreen]=useState("intro");const [i,setI]=useState(0);const [answers,setAnswers]=useState({});
  const [first,setFirst]=useState("");const [email,setEmail]=useState("");const [consent,setConsent]=useState(false);
  const [busy,setBusy]=useState(false);const [r,setR]=useState(null);const [insight,setInsight]=useState("");const [aiBusy,setAiBusy]=useState(false);
  const [t0]=useState(()=>Date.now());
  const qs=D.questions,q=qs[i];
  function pick(v){const na={...answers,[q.id]:v};setAnswers(na);track("question_answered",{index:i+1,kind:q.kind});
    if(i+1<qs.length)setI(i+1);else{track("email_gate_view",{});setScreen("gate")}}
  function goBack(){if(i>0)setI(i-1)}
  function submit(){setBusy(true);
    let res;try{res=score(answers)}catch(e){setBusy(false);alert("Something went wrong scoring your answers. Please use Back to check for anything unanswered.");return}
    const durationSec=Math.round((Date.now()-t0)/1000);
    const nAns=Object.keys(answers).length||1;
    res.quality.durationSec=durationSec;
    res.quality.fast=durationSec/nAns<1.5;
    setR(res);
    const hasArch=res.route==="archetype";
    const archName=hasArch?res.primary.name:(res.route==="even"?"Even Profile":"Distinctive Blend");
    const archSlug=hasArch?res.primary.slug:(res.route==="even"?"even-profile":"distinctive-blend");
    const domains={}; Object.keys(D.model).forEach(d=>domains[DL(d)]=+res.domain[d].toFixed(2));
    const strengthsStr=res.topTraits.map(t=>t.trait).join(", ");
    const profileStr="Pattern: "+archName+(hasArch?" ("+res.primary.tagline+")":"")+". "
      +(hasArch&&res.second?"Secondary: "+res.second.name+". ":"")
      +"Domains: "+Object.keys(domains).map(d=>d+" "+domains[d]).join(", ")+". "
      +"Most emphasized: "+strengthsStr+". "
      +"Answer pattern: "+(res.quality.total-res.quality.flagged)+"/"+res.quality.total+" areas aligned. "
      +"Versions: "+D.versions.scoring+".";
    const payload={firstName:first.trim(),email:email.trim(),consent:true,
      archetype:archName, archetypeSlug:archSlug,
      secondary:(hasArch&&res.second?res.second.name:""),
      domains, strengths:strengthsStr, profile:profileStr,
      durationSec, versions:D.versions,
      fcMost:res.fcM, fcLeast:res.fcL, attribution:ATTR};
    track("lead_submit",{});track("quiz_complete",{archetype:archSlug});track("outcome",{outcome:archSlug});fbqt("Lead",true);
    setScreen("results");setBusy(false);setAiBusy(true);
    fetch(D.leadEndpoint,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)})
      .then(x=>x.json()).then(x=>setInsight((x&&x.insight)||"")).catch(()=>{}).finally(()=>setAiBusy(false));}
  if(screen==="intro")return <Intro onStart={()=>{track("quiz_start",{});fbqt("QuizStart",false);setScreen("quiz")}}/>;
  if(screen==="quiz")return <Question key={q.id} q={q} i={i} n={qs.length} onPick={pick} onBack={goBack}/>;
  if(screen==="gate")return <Gate first={first} setFirst={setFirst} email={email} setEmail={setEmail} consent={consent} setConsent={setConsent} onSubmit={submit} busy={busy}/>;
  return <Results r={r} first={first} insight={insight} aiBusy={aiBusy}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
